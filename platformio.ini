; PlatformIO Project Configuration File
;
;   Build options: build flags, source filter
;   Upload options: custom upload port, speed and extra flags
;   Library options: dependencies, extra library storages
;   Advanced options: extra scripting
;
; Please visit documentation for the other options and examples
; https://docs.platformio.org/page/projectconf.html

[env:esp32dev]
platform = espressif32
board = esp32dev
framework = espidf

; Set the Serial Monitor speed to match the ESP32's default bootloader speed
monitor_speed = 115200

; Optional: If your code crashes, this decodes the error backtrace into readable line numbers
monitor_filters = esp32_exception_decoder

; Optional: Uncomment and change these if PlatformIO cannot auto-detect your board
; upload_port = COM3      ; (Windows) Example: COM3, COM4
; monitor_port = COM3     ; (Windows) Example: COM3, COM4
; upload_port = /dev/ttyUSB0  ; (Mac/Linux) Example: /dev/ttyUSB0, /dev/cu.SLAB_USBtoUART